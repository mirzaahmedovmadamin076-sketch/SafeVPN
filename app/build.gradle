12 июн.
Ha, bu juda keng tarqalgan muammo! Sababi:

Nega VPN yoqilganda dasturlar ishlamaydi?
1. IP bloklash
Ba'zi xizmatlar (bank ilovalar, Telegram, Google) VPN IP manzillarini qora ro'yxatga olgan — ular VPN orqali ulanishni rad etadi.

2. DNS muammosi
VPN o'z DNS serverini ishlatadi, ba'zi dasturlar esa faqat mahalliy DNS bilan ishlaydi.

3. Split Tunneling yo'qligi
Bu eng asosiy muammo — VPN yoqilganda barcha trafik tunnel orqali o'tadi, holbuki ba'zi dasturlar mahalliy tarmoqda ishlashi kerak.

4. Firewall konflikt
VPN va Windows/Linux firewall o'rtasida ziddiyat yuzaga keladi.

Eng yaxshi yechim — Split Tunneling
Bu texnologiya orqali:

✅ Ba'zi dasturlar VPN orqali ishlaydi
✅ Ba'zi dasturlar to'g'ridan-to'g'ri internet orqali ishlaydi
✅ Bank ilovalar, Telegram, mahalliy tarmoq — hammasi bir vaqtda
Misol: YouTube va bloklangan saytlar VPN orqali, bank ilovasi esa oddiy internet orqali.

Shu muammoni hal qiladigan Split Tunneling funksiyasini VPN interfeysiga qo'shayinmi? Qaysi dasturlar VPN orqali, qaysilari oddiy internet orqali ishlashini o'zingiz belgilaysiz.

